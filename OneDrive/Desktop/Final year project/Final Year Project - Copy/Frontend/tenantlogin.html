<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RentNow - Login</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">tailwind.config = {darkMode: "class", theme: {extend: {colors: {primary: "#FAC638", "background-light": "#f8f8f5", "background-dark": "#231e0f", "surface-light": "#ffffff", "surface-dark": "#2c2b1b"}, fontFamily: {display: "Spline Sans", body: ["Spline Sans", "sans-serif"]}, borderRadius: {DEFAULT: "1rem", lg: "2rem", xl: "3rem", full: "9999px"}}}};</script>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        // Extracted from the vibrant yellow in the screenshot
                        primary: "#FFC83D", 
                        primaryHover: "#E5B22E",
                        // Light mode background (very subtle off-white)
                        "background-light": "#F9FAFB",
                        // Dark mode background (deep slate)
                        "background-dark": "#111827",
                        // Card background dark
                        "card-dark": "#1F2937",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                        sans: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                    },
                },
            },
        };
    </script>
<style>.form-input-transition {
            transition: border-color 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }
    </style>
</head>
<body class="font-sans bg-background-light dark:bg-background-dark text-gray-900 dark:text-gray-100 flex flex-col min-h-screen transition-colors duration-300">
<nav class="w-full px-6 py-5 flex justify-between items-center max-w-7xl mx-auto">
<a class="flex items-center gap-2 group" href="#">
<div class="size-8 bg-primary rounded-full flex items-center justify-center text-zinc-900">
<span class="material-symbols-outlined text-xl font-bold">home_work</span>
</div>
<span class="text-xl font-bold tracking-tight text-gray-900 dark:text-white">RentNow</span>
</a>
<div class="hidden sm:block text-sm text-gray-600 dark:text-gray-400">
            Need help? <a class="hover:text-primary transition-colors" href="#">Contact Support</a>
</div>
</nav>
<main class="flex-grow flex items-center justify-center p-4 sm:p-6 relative">
<div class="absolute top-1/4 left-1/4 w-72 h-72 bg-primary/20 rounded-full blur-3xl -z-10 animate-pulse"></div>
<div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-blue-400/10 rounded-full blur-3xl -z-10"></div>
<div class="w-full max-w-md bg-white dark:bg-card-dark rounded-2xl shadow-xl border border-gray-100 dark:border-gray-700 overflow-hidden">
<div class="p-8 sm:p-10">
<div class="text-center mb-8">
<h1 class="text-3xl font-extrabold text-gray-900 dark:text-white mb-2">Welcome Back</h1>
<p class="text-gray-500 dark:text-gray-400 text-sm">Enter your credentials to access your account.</p>
</div>
<form action="#" class="space-y-5" method="POST">
<div>
<label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-gray-300 dark:border-gray-600 rounded-lg text-gray-900 dark:text-white bg-white dark:bg-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent form-input-transition sm:text-sm" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<div>
<div class="flex items-center justify-between mb-1.5">
<label class="block text-sm font-medium text-gray-700 dark:text-gray-300" for="password">Password</label>
<a class="text-sm font-medium text-indigo-600 dark:text-primary hover:underline hover:text-indigo-500 dark:hover:text-primaryHover" href="#">Forgot password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 border border-gray-300 dark:border-gray-600 rounded-lg text-gray-900 dark:text-white bg-white dark:bg-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent form-input-transition sm:text-sm" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 dark:hover:text-gray-200" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<button class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-full shadow-sm text-sm font-bold text-gray-900 bg-primary hover:bg-primaryHover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all transform active:scale-[0.98]" type="submit">
                        Sign In
                    </button>
</form>
<div class="mt-8 relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-gray-200 dark:border-gray-700"></div>
</div>
</div>
<div class="px-8 py-5 bg-gray-50 dark:bg-gray-900/50 border-t border-gray-100 dark:border-gray-700 text-center">
<p class="text-sm text-gray-600 dark:text-gray-400">
                    Don't have an account yet? 
                    <a class="font-bold text-gray-900 dark:text-white hover:text-primary transition-colors" href="tenantsignup.html">Sign up </a>
</p>
</div>
</div>
</main>
<footer class="w-full py-6 text-center">
<p class="text-xs text-gray-400 dark:text-gray-600">
            © RentNow Inc. All rights reserved. • <a class="hover:text-gray-600 dark:hover:text-gray-400" href="#">Privacy Policy</a> • <a class="hover:text-gray-600 dark:hover:text-gray-400" href="#">Terms</a>
</p>
</footer>

</body></html>
